<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prévia do painel</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <a class="brand" href="#" aria-label="EvoAI Fitness — início">
          <img class="brand__logo brand__logo--header" src="/evoai-fitness-logo.png" alt="" />
        </a>
        <details class="header-menu">
          <summary>Menu <span aria-hidden="true">⌄</span></summary>
          <nav aria-label="Menu da conta">
            <a href="#">Usuários</a><a href="#">Catálogo</a><a href="#">Meu perfil</a><button type="button">Sair</button>
          </nav>
        </details>
      </header>
      <main class="training-dashboard">
        <section class="calendar-hero">
          <div><span class="eyebrow">PLANEJAMENTO ADAPTATIVO</span><h1>Quando você pode treinar?</h1><p>Marque sua disponibilidade. O EvoAI monta a semana pelas datas escolhidas e reorganiza o restante quando um treino acontece fora do plano.</p></div>
        </section>
        <div class="calendar-sync calendar-sync--synced"><span></span>Calendário sincronizado</div>
        <div class="planner-layout"><section class="calendar-card"><div class="calendar-card__header"><div><span class="section-kicker">CALENDÁRIO</span><h2>Julho de 2026</h2></div><div class="calendar-navigation"><button>←</button><button>Hoje</button><button>→</button></div></div></section></div>
      </main>
    </div>
  </body>
</html>
